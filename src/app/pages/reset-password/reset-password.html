<div class="rp-wrapper">
  <div class="rp-card shadow-lg fade-in">

    <div class="rp-header">
      <img src="assets/dr_check_transparent.png" alt="Dr. Check" class="rp-mascot" />
      <h2>Neues Passwort</h2>
      <p>Gib dein neues Passwort ein.</p>
    </div>

    @if (error()) {
      <div class="rp-error">{{ error() }}</div>
    }

    @if (success()) {
      <div class="rp-success">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Passwort geändert! Du wirst weitergeleitet…
      </div>
    }

    @if (!success() && token()) {
      <form (submit)="$event.preventDefault(); submit(pw1.value, pw2.value)" class="rp-form">
        <div class="input-field">
          <label for="pw1">Neues Passwort</label>
          <input #pw1 type="password" id="pw1" placeholder="Mind. 8 Zeichen" required>
        </div>
        <div class="input-field">
          <label for="pw2">Passwort bestätigen</label>
          <input #pw2 type="password" id="pw2" placeholder="Wiederholen" required>
        </div>
        <button type="submit" class="btn-primary" [disabled]="loading()">
          @if (loading()) { Speichern… } @else { Passwort ändern }
        </button>
      </form>
    }

    @if (!token() && !success()) {
      <div class="rp-actions">
        <a href="/login" class="btn-back-link">Zurück zum Login</a>
      </div>
    }

  </div>
</div>
