<div class="login-wrapper">
  <div class="login-card shadow-lg">
    <div class="login-header">
      <h2>Willkommen bei CheckuIn</h2>
    </div>

    <div class="auth-tabs">
      <button
        [class.active]="isLoginMode()"
        (click)="isLoginMode.set(true); error.set(''); successMsg.set(''); unverifiedUsername.set('')"
        class="tab-btn">
        Anmelden
      </button>
      <button
        [class.active]="!isLoginMode()"
        (click)="isLoginMode.set(false); error.set(''); successMsg.set(''); unverifiedUsername.set('')"
        class="tab-btn">
        Registrieren
      </button>
    </div>

    @if (error()) {
      <div class="auth-error">
        {{ error() }}
        @if (unverifiedUsername()) {
          <br/>
          <button class="resend-btn" (click)="resendVerification()" [disabled]="loading()">
            Bestätigungs-E-Mail erneut senden
          </button>
        }
      </div>
    }
    @if (successMsg()) {
      <div class="auth-success">{{ successMsg() }}</div>
    }

    <form (submit)="$event.preventDefault(); onSubmit(loginInput.value, pwInput.value, nameInput.value)" class="login-form">

      <!-- Name field: always in DOM, hidden for login -->
      <div class="input-field" [style.display]="isLoginMode() ? 'none' : 'block'">
        <label for="name">Vollständiger Name</label>
        <input #nameInput type="text" id="name" name="name" placeholder="Max Mustermann">
      </div>

      <div class="input-field">
        <label for="loginInput">{{ isLoginMode() ? 'E-Mail oder Benutzername' : 'E-Mail-Adresse' }}</label>
        <input #loginInput type="text" id="loginInput" name="loginInput"
               [placeholder]="isLoginMode() ? 'name@example.com oder username' : 'name@example.com'"
               required>
      </div>

      <div class="input-field">
        <label for="password">Passwort</label>
        <div class="password-wrapper">
          <input #pwInput type="password" id="password" name="password"
                 [placeholder]="isLoginMode() ? 'Passwort' : 'Mind. 8 Zeichen'"
                 required>
          <span class="eye-icon">👁️</span>
        </div>
      </div>

      <div class="form-footer">
        <button type="submit" class="btn-primary" [disabled]="loading()">
          @if (loading()) {
            Laden…
          } @else {
            {{ isLoginMode() ? 'Anmelden' : 'Registrieren' }}
          }
        </button>
      </div>
    </form>
  </div>
</div>
